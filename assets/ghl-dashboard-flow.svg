<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8FAFC" />
      <stop offset="100%" style="stop-color:#EFF6FF" />
    </linearGradient>
    <filter id="shadow2" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.08"/>
    </filter>
    <marker id="a2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#38BDF8"/>
    </marker>
    <marker id="a2-teal" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2DD4BF"/>
    </marker>
    <marker id="a2-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E11D48"/>
    </marker>
  </defs>

  <rect width="1200" height="500" fill="url(#bg2)" rx="16"/>

  <text x="600" y="42" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#1E3A5F" text-anchor="middle">GHL Field Usage Dashboard</text>
  <text x="600" y="65" font-family="system-ui, sans-serif" font-size="13" fill="#64748B" text-anchor="middle">Custom Next.js app that audits, analyzes, and cleans up GoHighLevel custom fields via API</text>

  <!-- Box 1: GHL API -->
  <rect x="40" y="120" width="220" height="110" rx="12" fill="white" stroke="#38BDF8" stroke-width="2" filter="url(#shadow2)"/>
  <circle cx="58" cy="132" r="11" fill="#38BDF8"/>
  <text x="58" y="136" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="white" text-anchor="middle">1</text>
  <text x="150" y="158" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#1E3A5F" text-anchor="middle">GHL API</text>
  <text x="150" y="178" font-family="system-ui, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">LeadConnector REST API</text>
  <text x="150" y="198" font-family="system-ui, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">Pulls all contacts + custom</text>
  <text x="150" y="211" font-family="system-ui, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">fields from sub-account</text>

  <!-- Arrow 1→2 -->
  <line x1="260" y1="175" x2="330" y2="175" stroke="#38BDF8" stroke-width="2.5" marker-end="url(#a2)"/>
  <text x="295" y="166" font-family="system-ui, sans-serif" font-size="9" fill="#38BDF8" text-anchor="middle">sync data</text>

  <!-- Box 2: Prisma + Postgres -->
  <rect x="335" y="120" width="220" height="110" rx="12" fill="white" stroke="#8B5CF6" stroke-width="2" filter="url(#shadow2)"/>
  <circle cx="353" cy="132" r="11" fill="#8B5CF6"/>
  <text x="353" y="136" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="white" text-anchor="middle">2</text>
  <text x="445" y="158" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#1E3A5F" text-anchor="middle">Prisma + Postgres</text>
  <text x="445" y="178" font-family="system-ui, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">Data Processing</text>
  <text x="445" y="198" font-family="system-ui, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">Stores contacts, counts field</text>
  <text x="445" y="211" font-family="system-ui, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">usage, groups by lead source</text>

  <!-- Arrow 2→3 -->
  <line x1="555" y1="175" x2="625" y2="175" stroke="#8B5CF6" stroke-width="2.5" marker-end="url(#a2)"/>
  <text x="590" y="166" font-family="system-ui, sans-serif" font-size="9" fill="#8B5CF6" text-anchor="middle">query</text>

  <!-- Box 3: Next.js Dashboard -->
  <rect x="630" y="120" width="220" height="110" rx="12" fill="white" stroke="#2DD4BF" stroke-width="2" filter="url(#shadow2)"/>
  <circle cx="648" cy="132" r="11" fill="#2DD4BF"/>
  <text x="648" y="136" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="white" text-anchor="middle">3</text>
  <text x="740" y="158" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#1E3A5F" text-anchor="middle">Next.js Dashboard</text>
  <text x="740" y="178" font-family="system-ui, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">Visual Audit Interface</text>
  <text x="740" y="198" font-family="system-ui, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">Shows field usage stats</text>
  <text x="740" y="211" font-family="system-ui, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">Filter by source, sort, search</text>

  <!-- Arrow 3→4 -->
  <line x1="850" y1="175" x2="920" y2="175" stroke="#2DD4BF" stroke-width="2.5" marker-end="url(#a2-teal)"/>
  <text x="885" y="166" font-family="system-ui, sans-serif" font-size="9" fill="#2DD4BF" text-anchor="middle">action</text>

  <!-- Box 4: Delete Unused -->
  <rect x="925" y="120" width="220" height="110" rx="12" fill="white" stroke="#E11D48" stroke-width="2" filter="url(#shadow2)"/>
  <circle cx="943" cy="132" r="11" fill="#E11D48"/>
  <text x="943" y="136" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="white" text-anchor="middle">4</text>
  <text x="1035" y="158" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#1E3A5F" text-anchor="middle">Bulk Cleanup</text>
  <text x="1035" y="178" font-family="system-ui, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">Delete via GHL API</text>
  <text x="1035" y="198" font-family="system-ui, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">Remove unused fields</text>
  <text x="1035" y="211" font-family="system-ui, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">directly from dashboard</text>

  <!-- Problem → Solution section -->
  <rect x="40" y="290" width="540" height="100" rx="12" fill="white" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow2)"/>
  <text x="60" y="320" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#E11D48">THE PROBLEM</text>
  <text x="60" y="342" font-family="system-ui, sans-serif" font-size="11" fill="#475569">GHL agencies accumulate hundreds of custom fields over time.</text>
  <text x="60" y="360" font-family="system-ui, sans-serif" font-size="11" fill="#475569">No native way to see which fields are actually used vs. dead weight.</text>
  <text x="60" y="378" font-family="system-ui, sans-serif" font-size="11" fill="#475569">Manual cleanup across thousands of contacts is impossible.</text>

  <rect x="620" y="290" width="540" height="100" rx="12" fill="white" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow2)"/>
  <text x="640" y="320" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#2DD4BF">THE SOLUTION</text>
  <text x="640" y="342" font-family="system-ui, sans-serif" font-size="11" fill="#475569">Custom dashboard syncs all contacts via API, counts field usage.</text>
  <text x="640" y="360" font-family="system-ui, sans-serif" font-size="11" fill="#475569">Groups by lead source — see exactly which sources use which fields.</text>
  <text x="640" y="378" font-family="system-ui, sans-serif" font-size="11" fill="#475569">One-click delete unused fields directly through the GHL API.</text>

  <!-- Legend -->
  <rect x="40" y="420" width="1120" height="50" rx="10" fill="white" opacity="0.7" stroke="#E2E8F0" stroke-width="1"/>
  <text x="60" y="450" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1E3A5F">Stack:</text>
  <text x="110" y="450" font-family="system-ui, sans-serif" font-size="11" fill="#475569">Next.js 14 · Prisma · PostgreSQL · GoHighLevel LeadConnector API · Tailwind CSS · Vercel</text>
</svg>
