<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8FAFC" />
      <stop offset="100%" style="stop-color:#EFF6FF" />
    </linearGradient>
    <filter id="shadow4" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1200" height="500" fill="url(#bg4)" rx="16"/>

  <text x="600" y="42" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#1E3A5F" text-anchor="middle">AIBOTS — AI Agent R&amp;D Lab</text>
  <text x="600" y="65" font-family="system-ui, sans-serif" font-size="13" fill="#64748B" text-anchor="middle">Prototyping and testing AI agents, voice platforms, and automation workflows before production</text>

  <!-- Center Hub -->
  <rect x="430" y="130" width="340" height="110" rx="16" fill="white" stroke="#38BDF8" stroke-width="2.5" filter="url(#shadow4)"/>
  <text x="600" y="170" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#1E3A5F" text-anchor="middle">AIBOTS Lab</text>
  <text x="600" y="195" font-family="system-ui, sans-serif" font-size="12" fill="#64748B" text-anchor="middle">Experiment → Validate → Ship to Production</text>
  <text x="600" y="215" font-family="system-ui, sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle">Testing ground for client-ready solutions</text>

  <!-- Spokes -->
  <!-- Voice AI -->
  <rect x="40" y="100" width="200" height="80" rx="10" fill="white" stroke="#8B5CF6" stroke-width="1.5" filter="url(#shadow4)"/>
  <text x="140" y="133" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#8B5CF6" text-anchor="middle">Voice AI Testing</text>
  <text x="140" y="153" font-family="system-ui, sans-serif" font-size="10" fill="#64748B" text-anchor="middle">Vapi · Retell · ElevenLabs</text>
  <text x="140" y="168" font-family="system-ui, sans-serif" font-size="10" fill="#64748B" text-anchor="middle">SimpleTalk · Bland</text>
  <line x1="240" y1="140" x2="430" y2="170" stroke="#8B5CF6" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Chatbots -->
  <rect x="40" y="210" width="200" height="80" rx="10" fill="white" stroke="#2DD4BF" stroke-width="1.5" filter="url(#shadow4)"/>
  <text x="140" y="243" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#2DD4BF" text-anchor="middle">Chatbot Prototypes</text>
  <text x="140" y="263" font-family="system-ui, sans-serif" font-size="10" fill="#64748B" text-anchor="middle">ManyChat · Voiceflow</text>
  <text x="140" y="278" font-family="system-ui, sans-serif" font-size="10" fill="#64748B" text-anchor="middle">Flowise · Custom bots</text>
  <line x1="240" y1="250" x2="430" y2="200" stroke="#2DD4BF" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Self-hosted LLMs -->
  <rect x="960" y="100" width="200" height="80" rx="10" fill="white" stroke="#E11D48" stroke-width="1.5" filter="url(#shadow4)"/>
  <text x="1060" y="133" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#E11D48" text-anchor="middle">Self-Hosted LLMs</text>
  <text x="1060" y="153" font-family="system-ui, sans-serif" font-size="10" fill="#64748B" text-anchor="middle">VPS · Docker · Ollama</text>
  <text x="1060" y="168" font-family="system-ui, sans-serif" font-size="10" fill="#64748B" text-anchor="middle">Open-source models</text>
  <line x1="960" y1="140" x2="770" y2="170" stroke="#E11D48" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- API Integrations -->
  <rect x="960" y="210" width="200" height="80" rx="10" fill="white" stroke="#F59E0B" stroke-width="1.5" filter="url(#shadow4)"/>
  <text x="1060" y="243" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#F59E0B" text-anchor="middle">API Integration</text>
  <text x="1060" y="263" font-family="system-ui, sans-serif" font-size="10" fill="#64748B" text-anchor="middle">CRM · Webhooks · REST</text>
  <text x="1060" y="278" font-family="system-ui, sans-serif" font-size="10" fill="#64748B" text-anchor="middle">OAuth · Middleware</text>
  <line x1="960" y1="250" x2="770" y2="200" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Workflow Automation -->
  <rect x="500" y="290" width="200" height="80" rx="10" fill="white" stroke="#38BDF8" stroke-width="1.5" filter="url(#shadow4)"/>
  <text x="600" y="323" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#38BDF8" text-anchor="middle">Workflow Automation</text>
  <text x="600" y="343" font-family="system-ui, sans-serif" font-size="10" fill="#64748B" text-anchor="middle">n8n · Zapier · Make</text>
  <text x="600" y="358" font-family="system-ui, sans-serif" font-size="10" fill="#64748B" text-anchor="middle">End-to-end flow testing</text>
  <line x1="600" y1="240" x2="600" y2="290" stroke="#38BDF8" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Bottom: Production Arrow -->
  <rect x="350" y="410" width="500" height="55" rx="12" fill="#1E3A5F" filter="url(#shadow4)"/>
  <text x="600" y="435" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">Validated techniques ship directly to production client projects</text>
  <text x="600" y="453" font-family="system-ui, sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle">ORAIA · GHL Dashboards · Custom Client Automations</text>

  <line x1="600" y1="370" x2="600" y2="410" stroke="#1E3A5F" stroke-width="2"/>
  <polygon points="593,405 607,405 600,412" fill="#1E3A5F"/>
</svg>
