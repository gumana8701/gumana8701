<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8FAFC" />
      <stop offset="100%" style="stop-color:#EFF6FF" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#38BDF8"/>
    </marker>
    <marker id="arrow-navy" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1E3A5F"/>
    </marker>
    <marker id="arrow-teal" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2DD4BF"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8B5CF6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="600" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <text x="600" y="45" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#1E3A5F" text-anchor="middle">ORAIA — AI Voice Agent Workflow</text>
  <text x="600" y="68" font-family="system-ui, sans-serif" font-size="13" fill="#64748B" text-anchor="middle">Automated outbound calling with calendar booking and post-call analysis</text>

  <!-- ========== ROW 1: Main Flow ========== -->

  <!-- Box 1: GoHighLevel (Trigger) -->
  <rect x="40" y="120" width="200" height="100" rx="12" fill="white" stroke="#38BDF8" stroke-width="2" filter="url(#shadow)"/>
  <text x="140" y="155" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#1E3A5F" text-anchor="middle">GoHighLevel</text>
  <text x="140" y="175" font-family="system-ui, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">Trigger Event</text>
  <text x="140" y="195" font-family="system-ui, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">Contact enters pipeline →</text>
  <text x="140" y="208" font-family="system-ui, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">fires webhook to ElevenLabs</text>

  <!-- Arrow 1→2 -->
  <line x1="240" y1="170" x2="320" y2="170" stroke="#38BDF8" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="280" y="160" font-family="system-ui, sans-serif" font-size="9" fill="#38BDF8" text-anchor="middle">webhook</text>

  <!-- Box 2: ElevenLabs (Voice Agent) -->
  <rect x="325" y="120" width="220" height="100" rx="12" fill="white" stroke="#8B5CF6" stroke-width="2" filter="url(#shadow)"/>
  <text x="435" y="155" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#1E3A5F" text-anchor="middle">ElevenLabs</text>
  <text x="435" y="175" font-family="system-ui, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">AI Voice Agent</text>
  <text x="435" y="195" font-family="system-ui, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">Executes outbound call</text>
  <text x="435" y="208" font-family="system-ui, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">Natural conversation with lead</text>

  <!-- Arrow 2→3 -->
  <line x1="545" y1="170" x2="625" y2="170" stroke="#1E3A5F" stroke-width="2.5" marker-end="url(#arrow-navy)"/>
  <text x="585" y="160" font-family="system-ui, sans-serif" font-size="9" fill="#1E3A5F" text-anchor="middle">call ends</text>

  <!-- Box 3: n8n (Analysis) -->
  <rect x="630" y="120" width="220" height="100" rx="12" fill="white" stroke="#2DD4BF" stroke-width="2" filter="url(#shadow)"/>
  <text x="740" y="155" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#1E3A5F" text-anchor="middle">n8n</text>
  <text x="740" y="175" font-family="system-ui, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">Post-Call Analysis</text>
  <text x="740" y="195" font-family="system-ui, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">GPT analyzes call transcript</text>
  <text x="740" y="208" font-family="system-ui, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">Extracts outcome + sentiment</text>

  <!-- Arrow 3→4 -->
  <line x1="850" y1="170" x2="930" y2="170" stroke="#2DD4BF" stroke-width="2.5" marker-end="url(#arrow-teal)"/>
  <text x="890" y="160" font-family="system-ui, sans-serif" font-size="9" fill="#2DD4BF" text-anchor="middle">results</text>

  <!-- Box 4: Slack (Notifications) -->
  <rect x="935" y="120" width="220" height="100" rx="12" fill="white" stroke="#E11D48" stroke-width="2" filter="url(#shadow)"/>
  <text x="1045" y="155" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#1E3A5F" text-anchor="middle">Slack</text>
  <text x="1045" y="175" font-family="system-ui, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">Notifications</text>
  <text x="1045" y="195" font-family="system-ui, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">Call result summary</text>
  <text x="1045" y="208" font-family="system-ui, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">Booked / No answer / Follow-up</text>

  <!-- ========== ROW 2: ElevenLabs ↔ GHL Calendar ========== -->

  <!-- Bidirectional arrow: ElevenLabs ↔ GHL Calendar -->
  <path d="M 435 220 L 435 310" stroke="#8B5CF6" stroke-width="2" stroke-dasharray="6,3" fill="none" marker-end="url(#arrow-purple)"/>
  <path d="M 425 310 L 425 225" stroke="#38BDF8" stroke-width="2" stroke-dasharray="6,3" fill="none" marker-end="url(#arrow)"/>

  <!-- Box 5: GHL Calendar -->
  <rect x="325" y="320" width="220" height="100" rx="12" fill="white" stroke="#38BDF8" stroke-width="2" filter="url(#shadow)"/>
  <text x="435" y="355" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#1E3A5F" text-anchor="middle">GHL Calendar</text>
  <text x="435" y="375" font-family="system-ui, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">Availability + Booking</text>
  <text x="435" y="395" font-family="system-ui, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">Agent checks open slots</text>
  <text x="435" y="408" font-family="system-ui, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">Books appointment in real-time</text>

  <!-- Labels for bidirectional -->
  <text x="460" y="260" font-family="system-ui, sans-serif" font-size="9" fill="#8B5CF6">check slots</text>
  <text x="460" y="290" font-family="system-ui, sans-serif" font-size="9" fill="#38BDF8">book appt</text>

  <!-- ========== ROW 2: WhatsApp Monitor ========== -->

  <!-- Arrow: WhatsApp → GHL -->
  <path d="M 140 320 L 140 270 L 140 220" stroke="#25D366" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Box 6: WhatsApp -->
  <rect x="40" y="320" width="200" height="100" rx="12" fill="white" stroke="#25D366" stroke-width="2" filter="url(#shadow)"/>
  <text x="140" y="355" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#1E3A5F" text-anchor="middle">WhatsApp</text>
  <text x="140" y="375" font-family="system-ui, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">Inbound Messages</text>
  <text x="140" y="395" font-family="system-ui, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">GHL monitors incoming</text>
  <text x="140" y="408" font-family="system-ui, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">chats via app-level integration</text>

  <!-- Label -->
  <text x="155" y="268" font-family="system-ui, sans-serif" font-size="9" fill="#25D366">monitored by GHL</text>

  <!-- ========== Step Numbers ========== -->
  <circle cx="55" cy="130" r="12" fill="#38BDF8"/>
  <text x="55" y="134" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">1</text>

  <circle cx="340" cy="130" r="12" fill="#8B5CF6"/>
  <text x="340" y="134" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">2</text>

  <circle cx="645" cy="130" r="12" fill="#2DD4BF"/>
  <text x="645" y="134" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">3</text>

  <circle cx="950" cy="130" r="12" fill="#E11D48"/>
  <text x="950" y="134" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">4</text>

  <!-- ========== Bottom Legend ========== -->
  <rect x="40" y="470" width="1120" height="90" rx="10" fill="white" opacity="0.7" stroke="#E2E8F0" stroke-width="1"/>
  
  <text x="60" y="500" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1E3A5F">Tech Stack:</text>
  
  <rect x="60" y="515" width="8" height="8" rx="2" fill="#38BDF8"/>
  <text x="75" y="523" font-family="system-ui, sans-serif" font-size="11" fill="#475569">GoHighLevel (CRM + Calendar + WhatsApp Monitor)</text>
  
  <rect x="390" y="515" width="8" height="8" rx="2" fill="#8B5CF6"/>
  <text x="405" y="523" font-family="system-ui, sans-serif" font-size="11" fill="#475569">ElevenLabs (AI Voice Agent)</text>
  
  <rect x="610" y="515" width="8" height="8" rx="2" fill="#2DD4BF"/>
  <text x="625" y="523" font-family="system-ui, sans-serif" font-size="11" fill="#475569">n8n + GPT (Post-Call Analysis)</text>
  
  <rect x="860" y="515" width="8" height="8" rx="2" fill="#E11D48"/>
  <text x="875" y="523" font-family="system-ui, sans-serif" font-size="11" fill="#475569">Slack (Team Notifications)</text>

  <rect x="60" y="538" width="8" height="8" rx="2" fill="#25D366"/>
  <text x="75" y="546" font-family="system-ui, sans-serif" font-size="11" fill="#475569">WhatsApp (Inbound Channel)</text>
</svg>
